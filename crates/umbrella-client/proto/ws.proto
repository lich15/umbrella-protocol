// UmbrellaX gateway WebSocket canary protocol — Protobuf wire contract for umx.pb.v1.
//
// Source of truth: rust_1mlrd/proto/umbrellax/gateway/v1/ws.proto.
// This file is a verbatim client-side copy synchronised manually whenever the
// backend definition changes (see docs/integration/gateway-svc-contract.md §4.1).
// Bumping the byte layout of ClientEnvelope / ServerEnvelope requires updating
// both repositories in lockstep and re-running the consumer-driven contract
// tests in tests/transport_websocket_contract.rs.

syntax = "proto3";

package umbrellax.gateway.v1;

message ClientEnvelope {
  uint64 seq = 1;

  oneof payload {
    ClientPing ping = 10;
    PresenceUpdate presence = 11;
    SendMessageRequest send_message = 12;
    DeliveryProbe delivery_probe = 13;
    ClientAuth auth = 14;
    ClientClose close = 15;
  }
}

message ServerEnvelope {
  uint64 seq = 1;

  oneof payload {
    ServerPong pong = 10;
    SendMessageAck send_ack = 11;
    DeliveryProbe delivery_probe = 12;
    ErrorEnvelope error = 13;
    AuthOk auth_ok = 14;
    // F-CLIENT-FACADE-1 session 4 (2026-05-19): CLIENT-SIDE FORWARD-COMPAT
    // EXTENSION. Backend `rust_1mlrd/proto/umbrellax/gateway/v1/ws.proto`
    // does NOT currently emit field 15; receive flow is served via the
    // separate blind-postman-svc HTTP/2 fetch path. The client side adds
    // this variant ahead of the backend so the facade `fetch_inbox` can
    // be implemented + tested end-to-end without waiting on the backend
    // protocol bump.
    //
    // Protobuf 3 guarantees forward-compat: an old backend that does not
    // emit field 15 leaves the oneof empty (Payload::None on the client,
    // surfaced as `WsTransportError::UnknownServerPayload`); a future
    // backend emitting field 15 is decoded correctly by both old and new
    // clients (old clients see Unknown). No risk to backend interop.
    //
    // When the backend adopts this variant the source files in both repos
    // become identical again per the §4.1 lockstep rule documented in
    // `docs/integration/gateway-svc-contract.md`. Until then, the
    // production path keeps using blind-postman-svc and the client uses
    // this variant only inside the mock-driven contract tests in
    // `tests/facade_fetch_inbox_gateway.rs`.
    IncomingMessage inbound = 15;
  }
}

message IncomingMessage {
  // SPEC-09 32-byte sender UserId (the same shape SendMessageRequest
  // accepts on the outbound path). After session 4+ sealed-sender wiring
  // (session 7) this slot carries the unwrapped sender identity rather
  // than raw bytes from the postman envelope.
  bytes from_user_id = 1;
  // Opaque ciphertext bytes — MLS application message (RFC 9420
  // §9.1) wrapped per chat mode (Cloud-wrap for CloudChat, sealed-sender
  // for SecretChat). Session 4 contract tests treat this as opaque bytes;
  // session 5+ wires the real MLS decrypt path.
  bytes ciphertext = 2;
  // Wall-clock millisecond timestamp recorded by the sender at send time.
  // Server may rewrite this on store-and-forward; client treats it as
  // advisory display-time metadata only.
  uint64 sent_ts_ms = 3;
  // Server-issued 16-byte message id formatted as 32-char lowercase hex,
  // matching SendMessageAck.msg_id. Lets the recipient correlate to
  // server-side delivery state.
  string msg_id = 4;
}

message ClientAuth {
  string token = 1;
  bytes device_id = 2;
}

message ClientClose {}

message AuthOk {}

message ClientPing {
  uint64 client_ts_ms = 1;
}

message ServerPong {
  uint64 client_ts_ms = 1;
  uint64 server_ts_ms = 2;
}

message PresenceUpdate {
  bool online = 1;
}

message SendMessageRequest {
  bytes to_user_id = 1;
  bytes ciphertext = 2;
}

message SendMessageAck {
  string msg_id = 1;
}

message DeliveryProbe {
  bytes probe_id = 1;
  uint64 sent_ts_ms = 2;
}

message ErrorEnvelope {
  string code = 1;
}
