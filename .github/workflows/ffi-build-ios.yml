name: FFI Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'crates/umbrella-ffi-swift/**'
      - 'crates/umbrella-ffi/**'
      - 'crates/umbrella-client/**'
      - 'examples/ios-harness/**'
      - '.github/workflows/ffi-build-ios.yml'
  pull_request:
    paths:
      - 'crates/umbrella-ffi-swift/**'
      - 'crates/umbrella-ffi/**'
      - 'crates/umbrella-client/**'
      - 'examples/ios-harness/**'
  workflow_dispatch:
  schedule:
    - cron: '43 3 * * 0'

# read-only checkout sufficient — actions/upload-artifact uses default
# GITHUB_TOKEN scope which does not require additional permissions.
# read-only checkout is sufficient — actions/upload-artifact uses the
# default GITHUB_TOKEN scope which requires no additional permissions.
permissions:
  contents: read

jobs:
  build-xcframework:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: '1.95.0'
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install iOS Rust targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: '. -> target'

      - name: Build XCFramework
        run: ./crates/umbrella-ffi-swift/build-xcframework.sh release

      - name: Swift Package test (iOS Simulator)
        working-directory: examples/ios-harness
        run: |
          xcodebuild test \
            -scheme UmbrellaTestHarness \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -enableCodeCoverage YES \
            | xcpretty

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: UmbrellaFFI-xcframework
          path: target/xcframework-build/UmbrellaFFI.xcframework
          retention-days: 30
