name: FFI Build Android

on:
  push:
    branches: [main]
    paths:
      - 'crates/umbrella-ffi-kotlin/**'
      - 'crates/umbrella-ffi/**'
      - 'crates/umbrella-client/**'
      - 'examples/android-harness/**'
      - '.github/workflows/ffi-build-android.yml'
  pull_request:
    paths:
      - 'crates/umbrella-ffi-kotlin/**'
      - 'crates/umbrella-ffi/**'
      - 'crates/umbrella-client/**'
      - 'examples/android-harness/**'
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 0'

# read-only checkout is sufficient — actions/upload-artifact uses the
# default GITHUB_TOKEN scope which requires no additional permissions.
permissions:
  contents: read

jobs:
  build-aar:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.2.11394342'

      - name: Select Android NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.2.11394342" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.2.11394342" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
        with:
          toolchain: '1.95.0'
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: '. -> target'

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1
        with:
          gradle-version: '8.7'

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked

      - name: Build AAR native libs + Kotlin bindings
        run: ./crates/umbrella-ffi-kotlin/build-aar.sh release

      - name: Gradle assembleRelease
        run: gradle -p examples/android-harness assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: umbrella-android-harness-apk
          path: examples/android-harness/app/build/outputs/apk/release/
          retention-days: 30

  emulator-test:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: build-aar
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.2.11394342'

      - name: Select Android NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.2.11394342" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.2.11394342" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
        with:
          toolchain: '1.95.0'
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: '. -> target'

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1
        with:
          gradle-version: '8.7'

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4 --locked

      - name: Build AAR native libs + Kotlin bindings
        run: ./crates/umbrella-ffi-kotlin/build-aar.sh release

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android emulator tests (API 31 x86_64)
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          script: gradle -p examples/android-harness connectedCheck --no-daemon
