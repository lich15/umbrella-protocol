name: dudect-benchmarks

# Pattern K из memory feedback_15_postulates.md: dudect constant-time
# verification — separate weekly CI job, не per-push. Full per-Reparaz
# spec sample budget (100 000 per branch) занимает ~5-10 min CPU per
# site x 4 sites = ~20-40 min total.
#
# constant-time verification per production design Decision 5 done predicate
# "constant-time verified для всех CT-критичных операций".
#
# Workflow uses only literal env values + repository checkout — no
# untrusted user inputs (issue titles, PR bodies, commit messages)
# touched in run: steps.

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dudect-full-budget:
    name: Dudect benches with 100 000 samples per branch
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DUDECT_SAMPLES: "100000"
      DUDECT_STRICT: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry plus build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-dudect-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-dudect-

      - name: Run dudect bench tests with WEEKLY_CI_SAMPLES = 100 000
        # `#[ignore]` gate skips dudect tests in default `cargo test`
        # (debug builds add panic + bounds checks distorting nanosecond
        # measurements). Weekly CI runs them explicitly via
        # `--ignored` flag in `--release` mode for accurate timing.
        run: |
          cargo test --release --locked -p umbrella-tests \
            --test dudect_constant_time \
            -- --ignored --nocapture --test-threads=1
